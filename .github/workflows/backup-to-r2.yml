name: Database Backup to R2 (Multi-DB Support)

on:
  schedule:
    # 北京时间 12:00 和 00:00 运行
    - cron: '0 4,16 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # 强制整个环境使用上海时间
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Install PostgreSQL Client
        run: |
          #由于 Postgres 17 较新，Ubuntu 默认源可能没有，需手动添加官方源
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          # 2. 安装 Client 17
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          
          # 3. 关键：将 17 版本的路径加到环境 PATH 最前面，强制替换默认版本
          echo "/usr/lib/postgresql/17/bin" >> $GITHUB_PATH

      - name: Process Multiple Databases
        env:
          # JSON 格式: [{"name": "db1", "url": "postgres://..."}, {"name": "db2", "url": "..."}]
          DB_BACKUP_CONFIG: ${{ secrets.DB_BACKUP_CONFIG }}
          # 上传目标：primary / secondary / both（可选）
          # 推荐用 Actions Variables 配置（非敏感），Secrets 也可（secret: R2_UPLOAD_TARGETS）
          R2_UPLOAD_TARGETS: ${{ vars.R2_UPLOAD_TARGETS }}
          R2_UPLOAD_TARGETS_SECRET: ${{ secrets.R2_UPLOAD_TARGETS }}

          # Primary R2（保持兼容：沿用现有 secrets）
          R2_PRIMARY_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_PRIMARY_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_PRIMARY_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_PRIMARY_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

          # Secondary R2（新增：第二账号 secrets）
          R2_SECONDARY_ACCESS_KEY_ID: ${{ secrets.R2_2_ACCESS_KEY_ID }}
          R2_SECONDARY_SECRET_ACCESS_KEY: ${{ secrets.R2_2_SECRET_ACCESS_KEY }}
          R2_SECONDARY_ACCOUNT_ID: ${{ secrets.R2_2_ACCOUNT_ID }}
          R2_SECONDARY_BUCKET_NAME: ${{ secrets.R2_2_BUCKET_NAME }}

          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          set -e
          set -o pipefail
          
          # 检查配置是否存在
          if [ -z "${DB_BACKUP_CONFIG:-}" ]; then
            echo "❌ Error: DB_BACKUP_CONFIG secret is empty."
            exit 1
          fi

          require_env() {
            local env_name="$1"
            if [ -z "${!env_name:-}" ]; then
              echo "❌ Error: required env var is empty: ${env_name}"
              exit 1
            fi
          }

          PRIMARY_READY=false
          SECONDARY_READY=false

          ensure_primary_config() {
            if [ "$PRIMARY_READY" = true ]; then
              return 0
            fi

            require_env R2_PRIMARY_ACCESS_KEY_ID
            require_env R2_PRIMARY_SECRET_ACCESS_KEY
            require_env R2_PRIMARY_ACCOUNT_ID
            require_env R2_PRIMARY_BUCKET_NAME
            R2_ENDPOINT_PRIMARY="https://${R2_PRIMARY_ACCOUNT_ID}.r2.cloudflarestorage.com"

            PRIMARY_READY=true
          }

          ensure_secondary_config() {
            if [ "$SECONDARY_READY" = true ]; then
              return 0
            fi

            require_env R2_SECONDARY_ACCESS_KEY_ID
            require_env R2_SECONDARY_SECRET_ACCESS_KEY
            require_env R2_SECONDARY_ACCOUNT_ID
            require_env R2_SECONDARY_BUCKET_NAME
            R2_ENDPOINT_SECONDARY="https://${R2_SECONDARY_ACCOUNT_ID}.r2.cloudflarestorage.com"

            SECONDARY_READY=true
          }

          # 读取上传目标（优先 Variable，其次 Secret；都没有则按是否配置 secondary 决定默认值）
          UPLOAD_TARGETS="${R2_UPLOAD_TARGETS:-}"
          if [ -z "$UPLOAD_TARGETS" ]; then
            UPLOAD_TARGETS="${R2_UPLOAD_TARGETS_SECRET:-}"
          fi
          if [ -z "$UPLOAD_TARGETS" ]; then
            if [ -n "${R2_SECONDARY_ACCESS_KEY_ID:-}" ] && [ -n "${R2_SECONDARY_SECRET_ACCESS_KEY:-}" ] \
              && [ -n "${R2_SECONDARY_ACCOUNT_ID:-}" ] && [ -n "${R2_SECONDARY_BUCKET_NAME:-}" ]; then
              UPLOAD_TARGETS="both"
            else
              UPLOAD_TARGETS="primary"
            fi
          fi

          case "$UPLOAD_TARGETS" in
            primary|secondary|both) ;;
            *)
              echo "❌ Error: invalid R2_UPLOAD_TARGETS='$UPLOAD_TARGETS' (allowed: primary|secondary|both)"
              exit 1
              ;;
          esac

          # 预校验默认目标的必要配置（按 DB 级 targets 覆盖时会按需再校验）
          if [ "$UPLOAD_TARGETS" = "primary" ] || [ "$UPLOAD_TARGETS" = "both" ]; then
            ensure_primary_config
          fi
          if [ "$UPLOAD_TARGETS" = "secondary" ] || [ "$UPLOAD_TARGETS" = "both" ]; then
            ensure_secondary_config
          fi

          # 准备上传路径变量
          YEAR=$(date +'%Y')
          MONTH=$(date +'%m')
          DATE_STR=$(date +'%Y%m%d-%H%M%S')
          
          # 错误标记
          HAS_ERROR=false

          # JSON 基本校验：必须是数组
          if ! echo "$DB_BACKUP_CONFIG" | jq -e 'type == "array"' >/dev/null; then
            echo "❌ Error: DB_BACKUP_CONFIG must be a JSON array."
            exit 1
          fi

          DB_COUNT=$(echo "$DB_BACKUP_CONFIG" | jq -r 'length')
          echo "Starting multi-database backup process... (count=${DB_COUNT}, targets=${UPLOAD_TARGETS})"
          
          # 使用 jq 解析 JSON 并循环处理
          # 注意：Base64 编码由 jq 处理可能太复杂，直接循环读取
          # 为了处理特殊字符，使用 jq -c 输出每一行 compact JSON
          while IFS= read -r db_item; do
            # 解析 name 和 url
            DB_NAME=$(echo "$db_item" | jq -r '.name // empty')
            DB_URL=$(echo "$db_item" | jq -r '.url // empty')
            DB_TARGETS=$(echo "$db_item" | jq -r '.targets // empty')

            if [ -z "$DB_NAME" ] || [ -z "$DB_URL" ]; then
              echo "⚠️  Skipping invalid config item (missing name/url)."
              continue
            fi

            # 每个数据库可选覆盖 targets：primary|secondary|both
            if [ -z "$DB_TARGETS" ]; then
              DB_TARGETS="$UPLOAD_TARGETS"
            else
              DB_TARGETS=$(echo "$DB_TARGETS" | tr '[:upper:]' '[:lower:]' | xargs)
            fi
            case "$DB_TARGETS" in
              primary|secondary|both) ;;
              *)
                echo "❌ Invalid targets for $DB_NAME: '$DB_TARGETS' (allowed: primary|secondary|both)"
                HAS_ERROR=true
                continue
                ;;
            esac
            
            FILENAME="${DB_NAME}-backup-${DATE_STR}.sql.gz"
            
            echo "---------------------------------------------------"
            echo "🗄️  Processing database: $DB_NAME"
            echo "📄 Target filename: $FILENAME"
            echo "🎯 Upload targets: $DB_TARGETS"
            
            # 先生成一次 dump，再按目标上传；任意目标成功即算成功
            if ! (pg_dump "$DB_URL" --format=plain --no-owner --no-acl --clean --if-exists | gzip -9 > "$FILENAME"); then
              echo "❌ Dump FAILED for $DB_NAME"
              HAS_ERROR=true
              rm -f "$FILENAME"
              continue
            fi

            ANY_UPLOAD_OK=false

            if [ "$DB_TARGETS" = "primary" ] || [ "$DB_TARGETS" = "both" ]; then
              ensure_primary_config
              S3_PATH_PRIMARY="s3://${R2_PRIMARY_BUCKET_NAME}/${YEAR}/${MONTH}/${FILENAME}"
              if AWS_ACCESS_KEY_ID="$R2_PRIMARY_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$R2_PRIMARY_SECRET_ACCESS_KEY" \
                aws s3 cp "$FILENAME" "$S3_PATH_PRIMARY" --endpoint-url "$R2_ENDPOINT_PRIMARY"; then
                echo "✅ Upload success (primary) for $DB_NAME"
                ANY_UPLOAD_OK=true
              else
                echo "⚠️  Upload failed (primary) for $DB_NAME"
              fi
            fi

            if [ "$DB_TARGETS" = "secondary" ] || [ "$DB_TARGETS" = "both" ]; then
              ensure_secondary_config
              S3_PATH_SECONDARY="s3://${R2_SECONDARY_BUCKET_NAME}/${YEAR}/${MONTH}/${FILENAME}"
              if AWS_ACCESS_KEY_ID="$R2_SECONDARY_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$R2_SECONDARY_SECRET_ACCESS_KEY" \
                aws s3 cp "$FILENAME" "$S3_PATH_SECONDARY" --endpoint-url "$R2_ENDPOINT_SECONDARY"; then
                echo "✅ Upload success (secondary) for $DB_NAME"
                ANY_UPLOAD_OK=true
              else
                echo "⚠️  Upload failed (secondary) for $DB_NAME"
              fi
            fi

            # 清理本地文件（无论上传是否成功）
            rm -f "$FILENAME"

            if [ "$ANY_UPLOAD_OK" = true ]; then
              echo "✅ Backup success for $DB_NAME (at least one target uploaded)"
            else
              echo "❌ Upload FAILED for $DB_NAME (all selected targets failed)"
              HAS_ERROR=true
            fi
            
          done < <(echo "$DB_BACKUP_CONFIG" | jq -c '.[]')
          
          # 如果有任何一个失败，最终让步骤失败，以便发送通知（如果配置了的话）
          if [ "$HAS_ERROR" = true ]; then
            echo "---------------------------------------------------"
            echo "❌ One or more backups failed."
            exit 1
          else
            echo "---------------------------------------------------"
            echo "🎉 All backups completed successfully."
          fi

      # 让 public 仓库保持“有活动”，避免 schedule 因长期无活动被 GitHub 自动停用。
      # 规则：仅当日期或 job 状态变化时提交（通常每天 1 次；极端情况下每天最多 2 次）。
      - name: Keep Repository Active (Heartbeat Commit)
        if: always()
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          JOB_STATUS: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          # 同步到远端最新，避免 push 冲突
          git fetch origin "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"
          git reset --hard "origin/$DEFAULT_BRANCH"

          HEARTBEAT_DIR=".github/keepalive"
          HEARTBEAT_FILE="${HEARTBEAT_DIR}/backup-heartbeat.json"

          mkdir -p "$HEARTBEAT_DIR"

          TODAY="$(date +'%Y-%m-%d')"
          PREV_DATE=""
          PREV_STATUS=""
          if [ -f "$HEARTBEAT_FILE" ]; then
            PREV_DATE="$(jq -r '.date // empty' "$HEARTBEAT_FILE" 2>/dev/null || true)"
            PREV_STATUS="$(jq -r '.status // empty' "$HEARTBEAT_FILE" 2>/dev/null || true)"
          fi

          if [ "$PREV_DATE" = "$TODAY" ] && [ "$PREV_STATUS" = "$JOB_STATUS" ]; then
            echo "Keepalive: no update needed (date/status unchanged)."
            exit 0
          fi

          jq -n \
            --arg date "$TODAY" \
            --arg status "$JOB_STATUS" \
            --arg run_id "$RUN_ID" \
            --arg run_number "$RUN_NUMBER" \
            --arg run_attempt "$RUN_ATTEMPT" \
            '{date:$date,status:$status,run_id:$run_id,run_number:$run_number,run_attempt:$run_attempt}' \
            > "$HEARTBEAT_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$HEARTBEAT_FILE"
          git commit -m "chore: keepalive (${TODAY}, ${JOB_STATUS})"
          git push origin "HEAD:$DEFAULT_BRANCH"
